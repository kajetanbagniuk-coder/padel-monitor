databases:
  - name: padel-db
    plan: free
    databaseName: padel_monitor
    user: padel_user

services:
  - type: web
    name: padel-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: padel-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.11
